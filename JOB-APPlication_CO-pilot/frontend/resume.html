<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume – Job Copilot</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .page-header h1 { font-size: 22px; color: #1e293b; }
        .page-meta { font-size: 13px; color: #64748b; margin-top: 4px; }

        .resume-layout { display: flex; flex-direction: column; gap: 20px; }

        /* ── Upload card ── */
        .upload-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            padding: 20px 24px;
        }
        .upload-card h3 {
            font-size: 14px; font-weight: 700; color: #374151;
            text-transform: uppercase; letter-spacing: .5px;
            margin-bottom: 14px;
        }

        .upload-zone {
            border: 2px dashed #d1d5db;
            border-radius: 8px;
            padding: 24px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            background: #f9fafb;
        }
        .upload-zone:hover { border-color: #2563eb; background: #eff6ff; }
        .upload-zone.drag-over { border-color: #2563eb; background: #dbeafe; }
        .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
        .upload-zone p { font-size: 14px; color: #374151; margin-bottom: 4px; }
        .upload-zone small { font-size: 12px; color: #9ca3af; }
        #fileInput { display: none; }

        .resume-list { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
        .resume-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; border-radius: 8px;
            border: 1.5px solid #e2e8f0; background: #f8fafc;
            gap: 10px;
        }
        .resume-item.selected {
            border-color: #2563eb; background: #eff6ff;
        }
        .resume-item-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
        .resume-item-info .file-icon { font-size: 22px; flex-shrink: 0; }
        .resume-item-name {
            font-size: 13px; font-weight: 600; color: #1e293b;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .resume-item-date { font-size: 11px; color: #94a3b8; }
        .resume-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .linked-badge {
            font-size: 11px; font-weight: 700; color: #16a34a;
            background: #f0fdf4; border: 1px solid #bbf7d0;
            border-radius: 12px; padding: 2px 8px; flex-shrink: 0;
        }

        /* ── Generated resume card ── */
        .resume-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            overflow: hidden;
        }
        .resume-card-header {
            padding: 14px 20px;
            border-bottom: 1px solid #f1f5f9;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 10px;
        }
        .resume-card-header span {
            font-size: 13px; font-weight: 600; color: #64748b;
            text-transform: uppercase; letter-spacing: .5px;
        }
        .char-count { font-size: 12px; color: #94a3b8; }

        .action-bar {
            display: flex; gap: 8px; flex-wrap: wrap;
        }

        #resumeText {
            width: 100%; min-height: 500px;
            padding: 24px; border: none; outline: none;
            resize: vertical;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: 14px; line-height: 1.7; color: #1e293b;
        }

        .state-box {
            padding: 48px 20px; text-align: center; color: #94a3b8;
        }
        .state-box .icon { font-size: 40px; margin-bottom: 12px; }
        .state-box p  { font-size: 15px; margin-bottom: 8px; color: #374151; }
        .state-box small { font-size: 13px; color: #94a3b8; }
        .state-box.error { color: #dc2626; }

        .spinner {
            display: inline-block; width: 18px; height: 18px;
            border: 3px solid rgba(255,255,255,.4);
            border-top-color: #fff; border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle; margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .action-bar { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Job Co-Pilot</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="application.html">Applications</a>
        <a href="resume.html" class="active">Resume</a>
        <a href="cover-letter.html">Cover Letter</a>
        <a href="interview.html">Interview</a>
        <button id="logoutBtn">Logout</button>
    </div>

    <div class="main-content">
        <div class="resume-layout">

            <!-- Page header -->
            <div class="page-header">
                <div>
                    <h1>Resume Builder</h1>
                    <div class="page-meta" id="pageMeta">Loading…</div>
                </div>
                <!-- Action bar — buttons injected by JS when draft exists -->
                <div class="action-bar" id="mainActions"></div>
            </div>

            <!-- Upload section -->
            <div class="upload-card">
                <h3>Your Resumes</h3>

                <div class="upload-zone" id="uploadZone">
                    <div class="icon">📄</div>
                    <p>Drag &amp; drop your resume here, or <strong>click to browse</strong></p>
                    <small>PDF or DOCX · max 10 MB</small>
                </div>
                <input type="file" id="fileInput" accept=".pdf,.docx">

                <div class="resume-list" id="resumeList">
                    <!-- populated by JS -->
                </div>
            </div>

            <!-- Generated resume card -->
            <div class="resume-card">
                <div class="resume-card-header">
                    <span>AI-Tailored Resume</span>
                    <span class="char-count" id="charCount"></span>
                </div>
                <div id="resumeBody">
                    <div class="state-box">
                        <div class="icon">⏳</div>
                        <p>Loading…</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/resume.js"></script>
</body>
</html>
