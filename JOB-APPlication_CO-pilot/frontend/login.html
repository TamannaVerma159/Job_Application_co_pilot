<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Co-Pilot</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="container">

    <div class="left">

        <h1>Job Application Co-Pilot</h1>

        <p>
            AI powered Resume Builder,
            Cover Letter Generator,
            Interview Preparation
        </p>

    </div>

    <div class="right">

        <form id="loginForm">

            <h2>Welcome Back</h2>

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

            <p id="message"></p>

        </form>

    </div>

</div>

<script src="js/login.js"></script>

</body>
</html>
