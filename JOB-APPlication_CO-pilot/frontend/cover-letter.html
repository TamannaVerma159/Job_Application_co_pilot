<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Letter – Job Copilot</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cover-wrap {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cover-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
        }

        .cover-header h1 { font-size: 22px; color: #1e293b; }

        .cover-meta {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        /* Action bar */
        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background .18s, transform .12s, box-shadow .18s;
        }
        .btn:hover  { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-success {
            background: #16a34a;
            color: #fff;
        }
        .btn-success:hover { background: #15803d; box-shadow: 0 4px 12px rgba(22,163,74,.3); }

        .btn-outline {
            background: #fff;
            color: #374151;
            border: 1.5px solid #d1d5db;
        }
        .btn-outline:hover { border-color: #2563eb; color: #2563eb; box-shadow: 0 2px 8px rgba(37,99,235,.12); }

        .btn-purple {
            background: #7c3aed;
            color: #fff;
        }
        .btn-purple:hover { background: #6d28d9; box-shadow: 0 4px 12px rgba(124,58,237,.3); }

        /* Cover letter card */
        .cover-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            overflow: hidden;
        }

        .cover-card-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .cover-card-header span {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .char-count { font-size: 12px; color: #94a3b8; }

        #coverText {
            width: 100%;
            min-height: 520px;
            padding: 24px;
            border: none;
            outline: none;
            resize: vertical;
            font-family: "Segoe UI", system-ui, sans-serif;
            font-size: 14px;
            line-height: 1.8;
            color: #1e293b;
            background: #fff;
        }

        /* State boxes */
        .state-box {
            padding: 48px 20px;
            text-align: center;
            color: #94a3b8;
        }
        .state-box .icon { font-size: 40px; margin-bottom: 12px; }
        .state-box p     { font-size: 15px; margin-bottom: 8px; }
        .state-box small { font-size: 13px; color: #cbd5e1; }
        .state-box a     { color: #2563eb; }
        .state-box.error { color: #dc2626; }
        .state-box.error small { color: #fca5a5; }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #1e293b;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity .25s, transform .25s;
            pointer-events: none;
            z-index: 999;
        }
        #toast.show    { opacity: 1; transform: translateY(0); }
        #toast.success { background: #16a34a; }
        #toast.error   { background: #dc2626; }

        @media (max-width: 640px) {
            .cover-header { flex-direction: column; }
            .action-bar   { width: 100%; }
            .btn          { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Job Co-Pilot</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="application.html">Applications</a>
        <a href="resume.html">Resume</a>
        <a href="cover-letter.html" class="active">Cover Letter</a>
        <a href="interview.html">Interview</a>
        <button id="logoutBtn">Logout</button>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <div class="cover-wrap">

            <!-- Page header -->
            <div class="cover-header">
                <div>
                    <h1>Cover Letter</h1>
                    <p class="cover-meta" id="coverMeta">Loading…</p>
                </div>
                <div class="action-bar">
                    <button class="btn btn-purple" id="regenerateBtn">
                        ↺ Regenerate
                    </button>
                    <button class="btn btn-success" id="saveBtn">
                        ✓ Save changes
                    </button>
                    <button class="btn btn-outline" id="downloadPdfBtn">
                        ↓ Download PDF
                    </button>
                    <button class="btn btn-outline" id="downloadDocxBtn">
                        ↓ Download DOCX
                    </button>
                </div>
            </div>

            <!-- Cover letter editor card -->
            <div class="cover-card">
                <div class="cover-card-header">
                    <span>AI-Generated Cover Letter</span>
                    <span class="char-count" id="charCount"></span>
                </div>
                <div id="coverBody">
                    <div class="state-box">
                        <div class="icon">⏳</div>
                        <p>Loading cover letter…</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="toast"></div>

    <script src="js/cover.js"></script>
</body>
</html>
