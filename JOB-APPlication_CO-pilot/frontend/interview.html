<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Prep – Job Copilot</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ── Layout ── */
        .interview-wrap {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .interview-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
        }

        .interview-header h1 { font-size: 22px; color: #1e293b; }

        .interview-meta {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        /* ── Buttons ── */
        .action-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: 7px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background .18s, transform .12s, box-shadow .18s;
        }
        .btn:hover  { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: .55; cursor: not-allowed; transform: none; }

        .btn-primary {
            background: #2563eb;
            color: #fff;
        }
        .btn-primary:hover { background: #1d4ed8; box-shadow: 0 4px 12px rgba(37,99,235,.3); }

        .btn-purple {
            background: #7c3aed;
            color: #fff;
        }
        .btn-purple:hover { background: #6d28d9; box-shadow: 0 4px 12px rgba(124,58,237,.3); }

        .btn-outline {
            background: #fff;
            color: #374151;
            border: 1.5px solid #d1d5db;
        }
        .btn-outline:hover { border-color: #2563eb; color: #2563eb; }

        /* ── Info bar ── */
        .info-bar {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 13px;
            color: #1e40af;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Question cards ── */
        .questions-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            overflow: hidden;
        }

        .questions-card-header {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .questions-card-header span {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .q-count {
            font-size: 12px;
            color: #94a3b8;
        }

        .question-list {
            padding: 8px 0;
        }

        /* Each question item */
        .q-item {
            border-bottom: 1px solid #f8fafc;
            transition: background .15s;
        }
        .q-item:last-child { border-bottom: none; }

        .q-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 20px;
            cursor: pointer;
            user-select: none;
        }
        .q-header:hover { background: #f8fafc; }

        .q-number {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            background: #eff6ff;
            color: #2563eb;
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }

        .q-text {
            flex: 1;
            font-size: 14.5px;
            color: #1e293b;
            line-height: 1.5;
            font-weight: 500;
        }

        .q-chevron {
            flex-shrink: 0;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 5px;
            transition: transform .2s;
        }
        .q-item.open .q-chevron { transform: rotate(180deg); }

        /* Practice answer area */
        .q-practice {
            display: none;
            padding: 0 20px 16px 62px;
        }
        .q-item.open .q-practice { display: block; }

        .q-practice label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .q-practice textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 7px;
            font-size: 13.5px;
            font-family: inherit;
            color: #374151;
            resize: vertical;
            outline: none;
            transition: border-color .18s;
            background: #fafafa;
        }
        .q-practice textarea:focus {
            border-color: #2563eb;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(37,99,235,.1);
        }
        .q-practice textarea::placeholder { color: #c4cdd6; }

        /* ── State boxes ── */
        .state-box {
            padding: 56px 20px;
            text-align: center;
            color: #94a3b8;
        }
        .state-box .icon { font-size: 44px; margin-bottom: 14px; }
        .state-box p     { font-size: 15px; margin-bottom: 8px; color: #64748b; }
        .state-box small { font-size: 13px; color: #cbd5e1; }
        .state-box a     { color: #2563eb; text-decoration: none; font-weight: 600; }
        .state-box a:hover { text-decoration: underline; }
        .state-box.error p { color: #dc2626; }

        /* Spinner inside button */
        .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #1e293b;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity .25s, transform .25s;
            pointer-events: none;
            z-index: 999;
        }
        #toast.show    { opacity: 1; transform: translateY(0); }
        #toast.success { background: #16a34a; }
        #toast.error   { background: #dc2626; }

        @media (max-width: 640px) {
            .interview-header { flex-direction: column; }
            .action-bar { width: 100%; }
            .btn { flex: 1; justify-content: center; }
            .q-practice { padding-left: 20px; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Job Co-Pilot</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="application.html">Applications</a>
        <a href="resume.html">Resume</a>
        <a href="cover-letter.html">Cover Letter</a>
        <a href="interview.html" class="active">Interview</a>
        <button id="logoutBtn">Logout</button>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <div class="interview-wrap">

            <!-- Page header -->
            <div class="interview-header">
                <div>
                    <h1>Interview Preparation</h1>
                    <p class="interview-meta" id="interviewMeta">Loading…</p>
                </div>
                <div class="action-bar">
                    <button class="btn btn-purple" id="regenerateBtn">
                        ↺ Regenerate
                    </button>
                    <button class="btn btn-outline" id="expandAllBtn">
                        ↕ Expand all
                    </button>
                    <button class="btn btn-primary" id="practiceBtn">
                        ▶ Practice mode
                    </button>
                </div>
            </div>

            <!-- Tip bar -->
            <div class="info-bar">
                💡 Click any question to expand a practice answer box. Use it to draft your response before the real interview.
            </div>

            <!-- Questions card -->
            <div class="questions-card">
                <div class="questions-card-header">
                    <span>Interview Questions</span>
                    <span class="q-count" id="qCount"></span>
                </div>
                <div id="questionList">
                    <div class="state-box">
                        <div class="icon">⏳</div>
                        <p>Loading questions…</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="toast"></div>
    <script src="js/interview.js"></script>
</body>
</html>
